# docker/docker-compose-fabric.yaml
# Rede Hyperledger Fabric para o consórcio do Estreito de Ormuz
# 4 organizações (brokers) + 1 orderer (Raft)

networks:
  fabric-network:
    name: fabric-network
    driver: bridge

volumes:
  # Volumes para persistência dos dados da blockchain
  orderer.ormuz.com:
  peer0.org1.ormuz.com:
  peer0.org2.ormuz.com:
  peer0.org3.ormuz.com:
  peer0.org4.ormuz.com:
  ca.org1.ormuz.com:
  ca.org2.ormuz.com:
  ca.org3.ormuz.com:
  ca.org4.ormuz.com:

services:
  # ============================================================================
  # ORDERER (Serviço de Ordenação)
  # ============================================================================
  orderer.ormuz.com:
    container_name: orderer.ormuz.com
    image: hyperledger/fabric-orderer:2.5.0
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_FILELEDGER_LOCATION=/var/hyperledger/orderer/data
      - ORDERER_CONSENSUS_WALDIR=/var/hyperledger/orderer/etcdraft/wal
      - ORDERER_CONSENSUS_SNAPDIR=/var/hyperledger/orderer/etcdraft/snapshot
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    ports:
      - "7050:7050"
    volumes:
      - ./genesis.block:/var/hyperledger/orderer/genesis.block:ro
      - ../crypto-config/ordererOrganizations/ormuz.com/orderers/orderer.ormuz.com/msp:/var/hyperledger/orderer/msp:ro
      - ../crypto-config/ordererOrganizations/ormuz.com/orderers/orderer.ormuz.com/tls:/var/hyperledger/orderer/tls:ro
      - orderer.ormuz.com:/var/hyperledger/orderer/data
    networks:
      - fabric-network
    restart: unless-stopped

  # ============================================================================
  # CERTIFICATE AUTHORITIES (CA) - Uma por organização
  # ============================================================================
  
  # CA para Organização 1 (Broker Norte)
  ca.org1.ormuz.com:
    container_name: ca.org1.ormuz.com
    image: hyperledger/fabric-ca:1.5.7
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org1.ormuz.com
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server/ca-cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server/ca-key.pem
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_TLS_CERTFILE=/etc/hyperledger/fabric-ca-server/tls-cert.pem
      - FABRIC_CA_SERVER_TLS_KEYFILE=/etc/hyperledger/fabric-ca-server/tls-key.pem
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../crypto-config/peerOrganizations/org1.ormuz.com/ca/:/etc/hyperledger/fabric-ca-server:ro
      - ca.org1.ormuz.com:/var/hyperledger/fabric-ca-server
    networks:
      - fabric-network
    restart: unless-stopped

  # CA para Organização 2 (Broker Sul)
  ca.org2.ormuz.com:
    container_name: ca.org2.ormuz.com
    image: hyperledger/fabric-ca:1.5.7
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org2.ormuz.com
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server/ca-cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server/ca-key.pem
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports:
      - "7154:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../crypto-config/peerOrganizations/org2.ormuz.com/ca/:/etc/hyperledger/fabric-ca-server:ro
      - ca.org2.ormuz.com:/var/hyperledger/fabric-ca-server
    networks:
      - fabric-network
    restart: unless-stopped

  # CA para Organização 3 (Broker Leste)
  ca.org3.ormuz.com:
    container_name: ca.org3.ormuz.com
    image: hyperledger/fabric-ca:1.5.7
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org3.ormuz.com
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server/ca-cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server/ca-key.pem
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports:
      - "7254:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../crypto-config/peerOrganizations/org3.ormuz.com/ca/:/etc/hyperledger/fabric-ca-server:ro
      - ca.org3.ormuz.com:/var/hyperledger/fabric-ca-server
    networks:
      - fabric-network
    restart: unless-stopped

  # CA para Organização 4 (Broker Oeste)
  ca.org4.ormuz.com:
    container_name: ca.org4.ormuz.com
    image: hyperledger/fabric-ca:1.5.7
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org4.ormuz.com
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server/ca-cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server/ca-key.pem
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports:
      - "7354:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../crypto-config/peerOrganizations/org4.ormuz.com/ca/:/etc/hyperledger/fabric-ca-server:ro
      - ca.org4.ormuz.com:/var/hyperledger/fabric-ca-server
    networks:
      - fabric-network
    restart: unless-stopped

  # ============================================================================
  # COUCHDB (Bancos de dados para estado dos peers)
  # ============================================================================

  couchdb.org1.ormuz.com:
    container_name: couchdb.org1.ormuz.com
    image: couchdb:3.2.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - /opt/couchdb/data/org1:/opt/couchdb/data
    networks:
      - fabric-network
    restart: unless-stopped

  couchdb.org2.ormuz.com:
    container_name: couchdb.org2.ormuz.com
    image: couchdb:3.2.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "6984:5984"
    volumes:
      - /opt/couchdb/data/org2:/opt/couchdb/data
    networks:
      - fabric-network
    restart: unless-stopped

  couchdb.org3.ormuz.com:
    container_name: couchdb.org3.ormuz.com
    image: couchdb:3.2.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    volumes:
      - /opt/couchdb/data/org3:/opt/couchdb/data
    networks:
      - fabric-network
    restart: unless-stopped

  couchdb.org4.ormuz.com:
    container_name: couchdb.org4.ormuz.com
    image: couchdb:3.2.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "8984:5984"
    volumes:
      - /opt/couchdb/data/org4:/opt/couchdb/data
    networks:
      - fabric-network
    restart: unless-stopped

  # ============================================================================
  # PEERS (Nós da Blockchain) - Um por organização (CORRIGIDOS - sem :ro)
  # ============================================================================

  # Peer Organização 1 (Broker Norte)
  peer0.org1.ormuz.com:
    container_name: peer0.org1.ormuz.com
    image: hyperledger/fabric-peer:2.5.0
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org1.ormuz.com
      - CORE_PEER_ADDRESS=peer0.org1.ormuz.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.ormuz.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.ormuz.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.ormuz.com:7051
      - CORE_PEER_LOCALMSPID=OrmuzOrg1MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.org1.ormuz.com:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/msp:/var/hyperledger/peer/msp
      - ../crypto-config/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/tls:/var/hyperledger/peer/tls
      - peer0.org1.ormuz.com:/var/hyperledger/peer/data
    ports:
      - "7051:7051"
      - "7052:7052"
    depends_on:
      - orderer.ormuz.com
      - couchdb.org1.ormuz.com
    networks:
      - fabric-network
    restart: unless-stopped

  # Peer Organização 2 (Broker Sul)
  peer0.org2.ormuz.com:
    container_name: peer0.org2.ormuz.com
    image: hyperledger/fabric-peer:2.5.0
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org2.ormuz.com
      - CORE_PEER_ADDRESS=peer0.org2.ormuz.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2.ormuz.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.ormuz.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.ormuz.com:7051
      - CORE_PEER_LOCALMSPID=OrmuzOrg2MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.org2.ormuz.com:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/org2.ormuz.com/peers/peer0.org2.ormuz.com/msp:/var/hyperledger/peer/msp
      - ../crypto-config/peerOrganizations/org2.ormuz.com/peers/peer0.org2.ormuz.com/tls:/var/hyperledger/peer/tls
      - peer0.org2.ormuz.com:/var/hyperledger/peer/data
    ports:
      - "7151:7051"
      - "7152:7052"
    depends_on:
      - orderer.ormuz.com
      - couchdb.org2.ormuz.com
    networks:
      - fabric-network
    restart: unless-stopped

  # Peer Organização 3 (Broker Leste)
  peer0.org3.ormuz.com:
    container_name: peer0.org3.ormuz.com
    image: hyperledger/fabric-peer:2.5.0
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org3.ormuz.com
      - CORE_PEER_ADDRESS=peer0.org3.ormuz.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org3.ormuz.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org3.ormuz.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org3.ormuz.com:7051
      - CORE_PEER_LOCALMSPID=OrmuzOrg3MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.org3.ormuz.com:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/org3.ormuz.com/peers/peer0.org3.ormuz.com/msp:/var/hyperledger/peer/msp
      - ../crypto-config/peerOrganizations/org3.ormuz.com/peers/peer0.org3.ormuz.com/tls:/var/hyperledger/peer/tls
      - peer0.org3.ormuz.com:/var/hyperledger/peer/data
    ports:
      - "7251:7051"
      - "7252:7052"
    depends_on:
      - orderer.ormuz.com
      - couchdb.org3.ormuz.com
    networks:
      - fabric-network
    restart: unless-stopped

  # Peer Organização 4 (Broker Oeste)
  peer0.org4.ormuz.com:
    container_name: peer0.org4.ormuz.com
    image: hyperledger/fabric-peer:2.5.0
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org4.ormuz.com
      - CORE_PEER_ADDRESS=peer0.org4.ormuz.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org4.ormuz.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org4.ormuz.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org4.ormuz.com:7051
      - CORE_PEER_LOCALMSPID=OrmuzOrg4MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/var/hyperledger/peer/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/var/hyperledger/peer/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/var/hyperledger/peer/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/var/hyperledger/peer/msp
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.org4.ormuz.com:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../crypto-config/peerOrganizations/org4.ormuz.com/peers/peer0.org4.ormuz.com/msp:/var/hyperledger/peer/msp
      - ../crypto-config/peerOrganizations/org4.ormuz.com/peers/peer0.org4.ormuz.com/tls:/var/hyperledger/peer/tls
      - peer0.org4.ormuz.com:/var/hyperledger/peer/data
    ports:
      - "7351:7051"
      - "7352:7052"
    depends_on:
      - orderer.ormuz.com
      - couchdb.org4.ormuz.com
    networks:
      - fabric-network
    restart: unless-stopped

  # ============================================================================
  # CLI (Interface de linha de comando para administração)
  # ============================================================================
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5.0
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.org1.ormuz.com:7051
      - CORE_PEER_LOCALMSPID=OrmuzOrg1MSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.ormuz.com/users/Admin@org1.ormuz.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../chaincode:/opt/gopath/src/github.com/chaincode
      - ../crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto
      - ./:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
    depends_on:
      - orderer.ormuz.com
      - peer0.org1.ormuz.com
      - peer0.org2.ormuz.com
      - peer0.org3.ormuz.com
      - peer0.org4.ormuz.com
    networks:
      - fabric-network
    restart: unless-stopped