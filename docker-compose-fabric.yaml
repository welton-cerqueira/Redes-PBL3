networks:
  fabric:

services:
  orderer.ormuz.com:
    image: hyperledger/fabric-orderer:latest
    container_name: orderer.ormuz.com
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrmuzOrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=false
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_ADMIN_TLS_ENABLED=false
    volumes:
      - ./crypto-config/ordererOrganizations/ormuz.com/orderers/orderer.ormuz.com/msp:/var/hyperledger/orderer/msp
    ports:
      - "7050:7050"
      - "9443:9443"
    networks:
      - fabric

  peer0.org1.ormuz.com:
    image: hyperledger/fabric-peer:latest
    container_name: peer0.org1.ormuz.com
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org1.ormuz.com
      - CORE_PEER_ADDRESS=0.0.0.0:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=0.0.0.0:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.ormuz.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.ormuz.com:7051
      - CORE_PEER_LOCALMSPID=OrmuzOrg1MSP
      - CORE_PEER_TLS_ENABLED=false
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/msp:/etc/hyperledger/fabric/msp
    ports:
      - "7051:7051"
      - "7052:7052"
    networks:
      - fabric
    depends_on:
      - orderer.ormuz.com

  ca.org1.ormuz.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org1.ormuz.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org1.ormuz.com
      - FABRIC_CA_SERVER_TLS_ENABLED=false
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    command: sh -c 'fabric-ca-server start -b admin:adminpw'
    networks:
      - fabric
