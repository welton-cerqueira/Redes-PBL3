peer:
  id: peer0.org1.ormuz.com
  networkId: dev
  listenAddress: 0.0.0.0:7051
  address: localhost:7051
  addressAutoDetect: false
  gomaxprocs: 2
  keepalive:
    minInterval: 60s
    client:
      interval: 60s
      timeout: 20s
    deliveryClient:
      interval: 60s
      timeout: 20s
  tls:
    enabled: false
    clientAuthRequired: false
  authentication:
    timewindow: 15m
  fileSystemPath: /var/hyperledger/production
  BCCSP:
    Default: SW
    SW:
      Hash: SHA2
      Security: 256
      FileKeyStore:
        KeyStore: ""
  mspConfigPath: /home/welton/Redes-PBL3/crypto-config/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/msp
  localMspId: OrmuzOrg1MSP
  handlers:
    authFilters: []
  discovery:
    enabled: true
    period: 60s
    touchPeriod: 60s
  gossip:
    bootstrap: localhost:7051
    endpoint: localhost:7051
    externalEndpoint: localhost:7051
    propagateIterations: 1
    propagatePeerNum: 3
    maxBlockCountToStore: 10
    maxPropagationBurstLatency: 10ms
    maxPropagationBurstSize: 10
    aliveTimeInterval: 5s
    aliveExpirationTimeout: 25s
    reconnectInterval: 25s
  limits:
    concurrency:
      endorsementService: 10
    deliverService: 250
