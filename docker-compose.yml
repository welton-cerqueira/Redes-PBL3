version: '3.8'

# ============================================================================
# REDE FABRIC (Blockchain) + BROKERS + DRONES + SENSORES
# Sistema Distribuído Completo
# ============================================================================

networks:
  ormuz-net:
    driver: bridge

# ============================================================================
# HYPERLEDGER FABRIC - BLOCKCHAIN (MODO HOST PARA ACESSO EXTERNO)
# ============================================================================

services:
  # Orderer - Nó de ordenação
  orderer.ormuz.com:
    image: hyperledger/fabric-orderer:latest
    container_name: orderer.ormuz.com
    network_mode: host
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrmuzOrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=false
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_ADMIN_TLS_ENABLED=false
    volumes:
      - ./crypto-config/ordererOrganizations/ormuz.com/orderers/orderer.ormuz.com/msp:/var/hyperledger/orderer/msp
    restart: unless-stopped

  # Peer da Organização 1
  peer0.org1.ormuz.com:
    image: hyperledger/fabric-peer:latest
    container_name: peer0.org1.ormuz.com
    network_mode: host
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.org1.ormuz.com
      - CORE_PEER_ADDRESS=0.0.0.0:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=0.0.0.0:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=172.16.201.2:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=172.16.201.2:7051
      - CORE_PEER_LOCALMSPID=OrmuzOrg1MSP
      - CORE_PEER_TLS_ENABLED=false
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/msp:/etc/hyperledger/fabric/msp
    restart: unless-stopped

  # Certificate Authority
  ca.org1.ormuz.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org1.ormuz.com
    network_mode: host
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca.org1.ormuz.com
      - FABRIC_CA_SERVER_TLS_ENABLED=false
      - FABRIC_CA_SERVER_PORT=7054
    command: sh -c 'fabric-ca-server start -b admin:adminpw'
    restart: unless-stopped

  # CLI - Para gerenciar a rede Fabric
  cli:
    image: hyperledger/fabric-tools:latest
    container_name: cli
    network_mode: host
    tty: true
    stdin_open: true
    environment:
      - CORE_PEER_TLS_ENABLED=false
      - CORE_PEER_LOCALMSPID=OrmuzOrg1MSP
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/org1.ormuz.com/users/Admin@org1.ormuz.com/msp
      - CORE_PEER_ADDRESS=127.0.0.1:7051
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: sleep infinity
    volumes:
      - ./:/opt/gopath/src/github.com/hyperledger/fabric/peer
      - /var/run/docker.sock:/host/var/run/docker.sock
    restart: unless-stopped

# ============================================================================
# BROKERS, DRONES E SENSORES
# ============================================================================

  # BROKER 1 - Setor Norte
  broker-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: broker-1
    network_mode: host
    environment:
      BROKER_ID: "broker-1"
      PORT_TCP: "9000"
      PORT_UDP: "9001"
      PORT_SENSORES: "9002"
      BROKER_HOST: "broker-1"
      BROKER_CALLBACK: "broker-1:9000"
      ENABLE_LEDGER: "true"
      LEDGER_GATEWAY: "http://172.16.201.2:7051"
      LEDGER_MOCK: "false"
    command:
      - "-id=broker-1"
      - "-porta-tcp=:9000"
      - "-porta-udp=:9001"
      - "-porta-ctrl=:9002"
      - "-drones=drone-01=localhost:9101,drone-02=localhost:9102"
      - "-peers=broker-2,localhost:9010,localhost:9011;broker-3,localhost:9020,localhost:9021;broker-4,localhost:9030,localhost:9031"
      - "-enable-ledger=true"
      - "-ledger-mock=false"
      - "-ledger-gateway=http://172.16.201.2:7051"
    restart: unless-stopped

  # BROKER 2 - Setor Sul
  broker-2:
