      PORT_UDP: "9011"
      PORT_SENSORES: "9012"
      BROKER_HOST: "broker-2"
      BROKER_CALLBACK: "broker-2:9010"
      ENABLE_LEDGER: "true"
      LEDGER_GATEWAY: "http://peer0.org1.ormuz.com:7051"
      LEDGER_MOCK: "false"
    command:
      - "-id=broker-2"
      - "-porta-tcp=:9010"
      - "-porta-udp=:9011"
      - "-porta-ctrl=:9012"
      - "-drones=drone-03=drone-03:9103,drone-04=drone-04:9104"
      - "-peers=broker-1,broker-1:9000,broker-1:9001;broker-3,broker-3:9020,broker-3:9021;broker-4,broker-4:9030,broker-4:9031"
      - "-enable-ledger=true"
      - "-ledger-mock=false"
      - "-ledger-gateway=http://peer0.org1.ormuz.com:7051"
    ports:
      - "9010:9010/tcp"
      - "9011:9011/udp"
      - "9012:9012/tcp"
    depends_on:
      - peer0.org1.ormuz.com
    restart: unless-stopped

  # BROKER 3 - Setor Leste
  broker-3:
