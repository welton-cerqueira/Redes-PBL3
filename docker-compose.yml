    command:
      - "-id=broker-4"
      - "-porta-tcp=:9030"
      - "-porta-udp=:9031"
      - "-porta-ctrl=:9032"
      - "-drones=drone-07=drone-07:9107,drone-08=drone-08:9108"
      - "-peers=broker-1,broker-1:9000,broker-1:9001;broker-2,broker-2:9010,broker-2:9011;broker-3,broker-3:9020,broker-3:9021"
