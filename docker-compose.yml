      LEDGER_MOCK: "false"
    command:
      - "-id=broker-2"
      - "-porta-tcp=:9010"
      - "-porta-udp=:9011"
      - "-porta-ctrl=:9012"
      - "-drones=drone-03=localhost:9103,drone-04=localhost:9104"
      - "-peers=broker-1,localhost:9000,localhost:9001;broker-3,localhost:9020,localhost:9021;broker-4,localhost:9030,localhost:9031"
      - "-enable-ledger=true"
