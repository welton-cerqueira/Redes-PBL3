      dockerfile: Dockerfile.sensor
    container_name: sensor-s1-mov
    network_mode: host
    environment:
      SENSOR_ID: "sensor-s1-mov"
      SENSOR_TIPO: "movimento"
      LOCALIZACAO: "setor-norte-1"
