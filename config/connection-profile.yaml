# config/connection-profile.yaml
# Perfil de conexão para Hyperledger Fabric
# Usado pelo broker para se conectar à rede blockchain do consórcio Ormuz

name: "ormuz-consortium-network"
version: "1.0.0"
description: "Rede Hyperledger Fabric para o consórcio do Estreito de Ormuz"

# ============================================================================
# CLIENTE - Configurações do lado do cliente
# ============================================================================
client:
  organization: OrmuzOrg1
  logging:
    level: info
  
  # Timeouts para operações
  connection:
    timeout:
      peer:
        endorser: 30s
        eventHub: 60s
        eventReg: 30s
      orderer: 30s
      discovery: 30s
  
  # Armazenamento de credenciais
  credentialStore:
    path: "/tmp/state-store"
    cryptoStore:
      path: "/tmp/state-store"
  
  # Criptografia
  BCCSP:
    security:
      enabled: true
      default:
        provider: "SW"
      hashAlgorithm: "SHA2"
      softVerify: true
      level: 256

# ============================================================================
# CANAIS - Canais do consórcio
# ============================================================================
channels:
  ormuz-channel:
    # Peers que participam deste canal
    peers:
      peer0.org1.ormuz.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
      peer0.org2.ormuz.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
      peer0.org3.ormuz.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
      peer0.org4.ormuz.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
    
    # Chaincodes implantados neste canal
    chaincodes:
      - token-contract
      - mission-contract

# ============================================================================
# ORGANIZAÇÕES - Membros do consórcio
# ============================================================================
organizations:
  OrmuzOrg1:
    mspid: OrmuzOrg1MSP
    cryptoPath: /etc/hyperledger/fabric/organizations/peerOrganizations/org1.ormuz.com/users/Admin@org1.ormuz.com/msp
    peers:
      - peer0.org1.ormuz.com
    certificateAuthorities:
      - ca.org1.ormuz.com
    adminPrivateKey:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org1.ormuz.com/users/Admin@org1.ormuz.com/msp/keystore/
    signedCert:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org1.ormuz.com/users/Admin@org1.ormuz.com/msp/signcerts/
  
  OrmuzOrg2:
    mspid: OrmuzOrg2MSP
    cryptoPath: /etc/hyperledger/fabric/organizations/peerOrganizations/org2.ormuz.com/users/Admin@org2.ormuz.com/msp
    peers:
      - peer0.org2.ormuz.com
    certificateAuthorities:
      - ca.org2.ormuz.com
  
  OrmuzOrg3:
    mspid: OrmuzOrg3MSP
    cryptoPath: /etc/hyperledger/fabric/organizations/peerOrganizations/org3.ormuz.com/users/Admin@org3.ormuz.com/msp
    peers:
      - peer0.org3.ormuz.com
    certificateAuthorities:
      - ca.org3.ormuz.com
  
  OrmuzOrg4:
    mspid: OrmuzOrg4MSP
    cryptoPath: /etc/hyperledger/fabric/organizations/peerOrganizations/org4.ormuz.com/users/Admin@org4.ormuz.com/msp
    peers:
      - peer0.org4.ormuz.com
    certificateAuthorities:
      - ca.org4.ormuz.com
  
  # Ordem (serviço de ordenação)
  OrdererOrg:
    mspid: OrdererMSP
    cryptoPath: /etc/hyperledger/fabric/organizations/ordererOrganizations/ormuz.com/users/Admin@ormuz.com/msp

# ============================================================================
# ORDERERS - Serviço de ordenação
# ============================================================================
orderers:
  orderer.ormuz.com:
    url: grpcs://orderer.ormuz.com:7050
    grpcOptions:
      ssl-target-name-override: orderer.ormuz.com
      grpc-max-send-message-length: 15
      grpc.keepalive_time_ms: 360000
      grpc.keepalive_timeout_ms: 180000
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/ordererOrganizations/ormuz.com/orderers/orderer.ormuz.com/msp/tlscacerts/tlsca.ormuz.com-cert.pem

# ============================================================================
# PEERS - Nós da blockchain por organização
# ============================================================================
peers:
  # Organização 1 (Broker 1 - Norte)
  peer0.org1.ormuz.com:
    url: grpcs://peer0.org1.ormuz.com:7051
    eventUrl: grpcs://peer0.org1.ormuz.com:7053
    grpcOptions:
      ssl-target-name-override: peer0.org1.ormuz.com
      grpc.keepalive_time_ms: 600000
      grpc.http2.min_time_between_pings_ms: 60000
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org1.ormuz.com/peers/peer0.org1.ormuz.com/msp/tlscacerts/tlsca.org1.ormuz.com-cert.pem
  
  # Organização 2 (Broker 2 - Sul)
  peer0.org2.ormuz.com:
    url: grpcs://peer0.org2.ormuz.com:7051
    eventUrl: grpcs://peer0.org2.ormuz.com:7053
    grpcOptions:
      ssl-target-name-override: peer0.org2.ormuz.com
      grpc.keepalive_time_ms: 600000
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org2.ormuz.com/peers/peer0.org2.ormuz.com/msp/tlscacerts/tlsca.org2.ormuz.com-cert.pem
  
  # Organização 3 (Broker 3 - Leste)
  peer0.org3.ormuz.com:
    url: grpcs://peer0.org3.ormuz.com:7051
    eventUrl: grpcs://peer0.org3.ormuz.com:7053
    grpcOptions:
      ssl-target-name-override: peer0.org3.ormuz.com
      grpc.keepalive_time_ms: 600000
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org3.ormuz.com/peers/peer0.org3.ormuz.com/msp/tlscacerts/tlsca.org3.ormuz.com-cert.pem
  
  # Organização 4 (Broker 4 - Oeste)
  peer0.org4.ormuz.com:
    url: grpcs://peer0.org4.ormuz.com:7051
    eventUrl: grpcs://peer0.org4.ormuz.com:7053
    grpcOptions:
      ssl-target-name-override: peer0.org4.ormuz.com
      grpc.keepalive_time_ms: 600000
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org4.ormuz.com/peers/peer0.org4.ormuz.com/msp/tlscacerts/tlsca.org4.ormuz.com-cert.pem

# ============================================================================
# AUTORIDADES CERTIFICADORAS (CA)
# ============================================================================
certificateAuthorities:
  ca.org1.ormuz.com:
    url: https://ca.org1.ormuz.com:7054
    caName: ca-org1
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org1.ormuz.com/ca/ca.org1.ormuz.com-cert.pem
    registrar:
      - enrollId: admin
        enrollSecret: adminpw
    caName: ca.org1.ormuz.com
  
  ca.org2.ormuz.com:
    url: https://ca.org2.ormuz.com:7054
    caName: ca-org2
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org2.ormuz.com/ca/ca.org2.ormuz.com-cert.pem
    registrar:
      - enrollId: admin
        enrollSecret: adminpw
  
  ca.org3.ormuz.com:
    url: https://ca.org3.ormuz.com:7054
    caName: ca-org3
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org3.ormuz.com/ca/ca.org3.ormuz.com-cert.pem
    registrar:
      - enrollId: admin
        enrollSecret: adminpw
  
  ca.org4.ormuz.com:
    url: https://ca.org4.ormuz.com:7054
    caName: ca-org4
    tlsCACerts:
      path: /etc/hyperledger/fabric/organizations/peerOrganizations/org4.ormuz.com/ca/ca.org4.ormuz.com-cert.pem
    registrar:
      - enrollId: admin
        enrollSecret: adminpw

# ============================================================================
# GATEWAY CONFIG - Para o ledger_client.go (HTTP REST)
# ============================================================================
# Esta seção é usada pelo ledger_client.go para conexão via REST
# Os endpoints abaixo devem estar disponíveis na rede
gateway:
  enabled: true
  url: http://localhost:8080
  apiEndpoints:
    query: /api/query
    execute: /api/execute
    health: /health